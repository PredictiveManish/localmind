site_name: LocalMind
site_description: Understand your hardware and find the best local AI models for your machine.
site_url: https://localmind.github.io
repo_url: https://github.com/predictivemanish/localmind
repo_name: predictivemanish/localmind

theme:
  name: mkdocs
  primary: indigo
  accent: deep purple
  logo: img/logo.svg
  favicon: img/logo.svg
  features:
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - navigation.sections
    - navigation.top

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/predictivemanish/localmind
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/localmind/

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Installation: installation.md
  - Usage Guide: usage.md
  - Features & Architecture: features.md
